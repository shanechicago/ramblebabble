document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

vw;border-radius:50%;background:radial-gradient(circle,var(--violet),transparent 65%);filter:blur(60px);opacity:var(--glow);animation:rb-blob1 22s ease-in-out infinite\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:-18vh;right:-8vw;width:44vw;height:44vw;border-radius:50%;background:radial-gradient(circle,var(--pink),transparent 65%);filter:blur(70px);opacity:var(--glow);animation:rb-blob2 26s ease-in-out infinite\"><\u002Fdiv>\n  <div style=\"position:absolute;top:30vh;right:24vw;width:30vw;height:30vw;border-radius:50%;background:radial-gradient(circle,var(--coral),transparent 65%);filter:blur(70px);opacity:calc(var(--glow) * 0.7);animation:rb-blob3 19s ease-in-out infinite\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:relative;z-index:1;min-height:100vh;color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased\">\n\n  <sc-if value=\"{{showHeader}}\" hint-placeholder-val=\"{{true}}\">\n    <header style=\"position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:16px 30px;backdrop-filter:blur(14px);background:color-mix(in srgb, var(--bg) 72%, transparent);border-bottom:1px solid var(--line)\">\n      <button onclick=\"{{goWorkspace}}\" style=\"display:flex;align-items:baseline;gap:1px;background:none;border:none;cursor:pointer;padding:0\">\n        <span style=\"font-size:25px;font-weight:700;letter-spacing:-0.02em;color:var(--text)\">Ramble<\u002Fspan>\n        <span style=\"font-family:'Caveat Brush',cursive;font-size:34px;line-height:0.8;background:linear-gradient(95deg,var(--violet),var(--pink) 55%,var(--coral));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;padding-right:2px\">Babble<\u002Fspan>\n      <\u002Fbutton>\n      <nav style=\"display:flex;align-items:center;gap:8px\">\n        <button onclick=\"{{goWorkspace}}\" style=\"padding:9px 15px;border-radius:11px;border:1px solid transparent;background:none;color:var(--text-dim);font-size:14px;font-weight:500;cursor:pointer;transition:all .18s\" style-hover=\"color:var(--text);background:var(--surface-2)\">Workspace<\u002Fbutton>\n        <button onclick=\"{{goRambles}}\" style=\"padding:9px 15px;border-radius:11px;border:1px solid transparent;background:none;color:var(--text-dim);font-size:14px;font-weight:500;cursor:pointer;transition:all .18s\" style-hover=\"color:var(--text);background:var(--surface-2)\">My rambles<\u002Fbutton>\n        <button onclick=\"{{toggleTheme}}\" title=\"{{themeLabel}}\" style=\"width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s\" style-hover=\"color:var(--text);border-color:var(--violet)\">{{themeIcon}}<\u002Fbutton>\n        <button onclick=\"{{goSignin}}\" title=\"Account\" style=\"width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--violet),var(--pink));color:white;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px -4px rgba(123,92,255,0.7)\">R<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fheader>\n  <\u002Fsc-if>\n\n  <!-- ========== SIGN IN ========== -->\n  <sc-if value=\"{{isSignin}}\" hint-placeholder-val=\"{{false}}\">\n    <div style=\"display:grid;grid-template-columns:1.05fr 0.95fr;min-height:100vh\">\n      <div style=\"position:relative;overflow:hidden;padding:56px 60px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(150deg,rgba(123,92,255,0.16),rgba(255,77,157,0.1) 50%,rgba(255,111,97,0.12));border-right:1px solid var(--line)\">\n        <div style=\"display:flex;align-items:baseline;gap:1px\">\n          <span style=\"font-size:30px;font-weight:700;letter-spacing:-0.02em\">Ramble<\u002Fspan>\n          <span style=\"font-family:'Caveat Brush',cursive;font-size:42px;line-height:0.8;background:linear-gradient(95deg,var(--violet),var(--pink) 55%,var(--coral));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">Babble<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"max-width:460px\">\n          <h1 style=\"font-size:52px;line-height:1.04;font-weight:700;letter-spacing:-0.03em;margin:0 0 22px\">Ramble in.<br>Brilliance out... <span style=\"font-family:'Caveat Brush',cursive;font-size:60px;background:linear-gradient(95deg,var(--coral),var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">sometimes wildly wacky.<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:17px;line-height:1.55;color:var(--text-dim);margin:0 0 34px\">Dump in the voice-to-text chaos, the almost-genius ideas, and the texts you probably should not send yet. Watch the mess turn into clean messages, useful notes, AI prompts, or spicy little masterpieces with a personality disorder.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <div style=\"display:flex;align-items:center;gap:13px\"><span style=\"width:9px;height:9px;border-radius:50%;background:var(--violet);box-shadow:0 0 12px var(--violet)\"><\u002Fspan><span style=\"font-size:15px;color:var(--text-dim)\">Voice-to-text chaos in, polished words out<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:13px\"><span style=\"width:9px;height:9px;border-radius:50%;background:var(--pink);box-shadow:0 0 12px var(--pink)\"><\u002Fspan><span style=\"font-size:15px;color:var(--text-dim)\">Stack format, tone, character and accent<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:13px\"><span style=\"width:9px;height:9px;border-radius:50%;background:var(--coral);box-shadow:0 0 12px var(--coral)\"><\u002Fspan><span style=\"font-size:15px;color:var(--text-dim)\">Clean messages, work notes, AI prompts, or chaos<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:13px;color:var(--text-faint);margin:0\">No setup. No clutter. Just ramble.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:center;padding:40px\">\n        <div style=\"width:100%;max-width:380px\">\n          <div style=\"display:inline-flex;padding:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:13px;margin-bottom:26px\">\n            <button onclick=\"{{setSignIn}}\" style=\"padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;background:{{signInTabBg}};color:{{signInTabColor}}\">Sign in<\u002Fbutton>\n            <button onclick=\"{{setCreate}}\" style=\"padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;background:{{createTabBg}};color:{{createTabColor}}\">Create account<\u002Fbutton>\n          <\u002Fdiv>\n          <h2 style=\"font-size:28px;font-weight:700;letter-spacing:-0.02em;margin:0 0 6px\">{{authTitle}}<\u002Fh2>\n          <p style=\"font-size:15px;color:var(--text-dim);margin:0 0 28px\">{{authSub}}<\u002Fp>\n          <label style=\"display:block;font-size:13px;font-weight:500;color:var(--text-dim);margin-bottom:8px\">Username<\u002Flabel>\n          <input type=\"text\" placeholder=\"yourname\" style=\"width:100%;padding:14px 15px;margin-bottom:18px;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--text);font-size:15px;outline:none;transition:border-color .18s\" style-focus=\"border-color:var(--violet)\">\n          <label style=\"display:block;font-size:13px;font-weight:500;color:var(--text-dim);margin-bottom:8px\">Password<\u002Flabel>\n          <input type=\"password\" placeholder=\"at least eight characters\" style=\"width:100%;padding:14px 15px;margin-bottom:26px;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--text);font-size:15px;outline:none;transition:border-color .18s\" style-focus=\"border-color:var(--violet)\">\n          <button onclick=\"{{goWorkspace}}\" style=\"display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:15px;border:none;border-radius:13px;cursor:pointer;font-size:16px;font-weight:600;color:white;background:linear-gradient(95deg,var(--violet),var(--pink));box-shadow:0 12px 34px -10px rgba(123,92,255,0.8);transition:transform .16s,box-shadow .16s\" style-hover=\"transform:translateY(-2px);box-shadow:0 18px 44px -10px rgba(255,77,157,0.8)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 10a7 7 0 0 0 14 0\"><\u002Fpath><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><\u002Fsvg>{{authCTA}}<\u002Fbutton>\n          <div style=\"display:flex;align-items:center;gap:12px;margin:18px 0\"><span style=\"flex:1;height:1px;background:var(--line)\"><\u002Fspan><span style=\"font-size:12px;color:var(--text-faint)\">or<\u002Fspan><span style=\"flex:1;height:1px;background:var(--line)\"><\u002Fspan><\u002Fdiv>\n          <button onclick=\"{{goWorkspace}}\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border:1px solid var(--line);border-radius:13px;cursor:pointer;font-size:15px;font-weight:600;color:var(--text);background:var(--surface);transition:border-color .18s,transform .16s\" style-hover=\"border-color:var(--violet);transform:translateY(-1px)\"><span style=\"width:20px;height:20px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#4285F4;font-family:Arial,sans-serif\">G<\u002Fspan>Continue with Google<\u002Fbutton>\n          <p style=\"text-align:center;font-size:13px;color:var(--text-faint);margin:20px 0 0\">By continuing you agree to talk a little messy.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ========== WORKSPACE ========== -->\n  <sc-if value=\"{{isWorkspace}}\" hint-placeholder-val=\"{{false}}\">\n    <main style=\"max-width:1320px;margin:0 auto;padding:28px 30px 60px\">\n      <div style=\"display:grid;grid-template-columns:1fr 348px 1fr;gap:18px;align-items:stretch\">\n\n        <!-- INPUT -->\n        <section style=\"display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:20px;overflow:hidden;min-height:560px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)\">\n            <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:8px;height:8px;border-radius:50%;background:var(--coral);box-shadow:0 0 10px var(--coral)\"><\u002Fspan><span style=\"font-size:14px;font-weight:600;letter-spacing:-0.01em\">Your ramble<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <button onclick=\"{{doPaste}}\" style=\"display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s\" style-hover=\"color:var(--text);border-color:var(--violet)\">Paste<\u002Fbutton>\n              <button onclick=\"{{toggleRecord}}\" style=\"display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:white;background:{{recordBg}};box-shadow:{{recordShadow}};transition:all .18s\">\n                <span style=\"width:9px;height:9px;border-radius:{{recordDotRadius}};background:white;display:inline-block\"><\u002Fspan>{{recordLabel}}\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"position:relative;flex:1;display:flex\">\n            <textarea value=\"{{inputText}}\" onchange=\"{{onInput}}\" placeholder=\"Hit record and just talk, or paste the chaos here. The half thoughts, the almost-genius ideas, the texts you should not send yet. That is the point.\" style=\"flex:1;width:100%;resize:none;border:none;outline:none;background:transparent;color:var(--text);font-size:16px;line-height:1.62;padding:20px;font-family:inherit\"><\u002Ftextarea>\n            <sc-if value=\"{{isRecording}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"position:absolute;inset:0;backdrop-filter:blur(3px);background:color-mix(in srgb,var(--surface) 60%,transparent);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px\">\n                <div style=\"display:flex;align-items:flex-end;gap:5px;height:54px\">\n                  <span style=\"width:6px;height:100%;border-radius:4px;background:var(--violet);transform-origin:bottom;animation:rb-eq .9s ease-in-out infinite\"><\u002Fspan>\n                  <span style=\"width:6px;height:100%;border-radius:4px;background:var(--pink);transform-origin:bottom;animation:rb-eq .9s ease-in-out infinite .15s\"><\u002Fspan>\n                  <span style=\"width:6px;height:100%;border-radius:4px;background:var(--coral);transform-origin:bottom;animation:rb-eq .9s ease-in-out infinite .3s\"><\u002Fspan>\n                  <span style=\"width:6px;height:100%;border-radius:4px;background:var(--pink);transform-origin:bottom;animation:rb-eq .9s ease-in-out infinite .45s\"><\u002Fspan>\n                  <span style=\"width:6px;height:100%;border-radius:4px;background:var(--violet);transform-origin:bottom;animation:rb-eq .9s ease-in-out infinite .6s\"><\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:30px;font-weight:700;letter-spacing:0.02em;font-variant-numeric:tabular-nums\">{{recordTime}}<\u002Fdiv>\n                <div style=\"font-size:13px;color:var(--text-dim)\">Listening. Tap stop when you are done.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-top:1px solid var(--line);font-size:13px;color:var(--text-faint)\">\n            <span>{{inputWords}} words, {{inputCount}} characters<\u002Fspan>\n            <button onclick=\"{{clearInput}}\" style=\"background:none;border:none;color:var(--text-faint);font-size:13px;cursor:pointer;transition:color .18s\" style-hover=\"color:var(--coral)\">Clear input<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- CONTROLS -->\n        <section style=\"display:flex;flex-direction:column;gap:12px;background:linear-gradient(170deg,rgba(123,92,255,0.1),rgba(255,77,157,0.06));border:1px solid var(--line);border-radius:20px;padding:18px;position:relative\">\n          <div style=\"text-align:center;margin-bottom:2px\">\n            <div style=\"font-size:15px;font-weight:600;letter-spacing:-0.01em\">How should it come out?<\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--text-dim);margin-top:3px\">Stack any of these. They combine.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{selectors}}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative\">\n              <button onclick=\"{{s.onToggle}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-radius:13px;border:1px solid {{s.borderColor}};background:var(--surface);cursor:pointer;transition:all .18s\" style-hover=\"border-color:var(--violet)\">\n                <span style=\"display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left\">\n                  <span style=\"font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-faint)\">{{s.label}}<\u002Fspan>\n                  <span style=\"font-size:15px;font-weight:600;color:{{s.valueColor}}\">{{s.display}}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"font-size:11px;color:var(--text-faint);transform:{{s.caretRotate}};transition:transform .2s\">v<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{s.isOpen}}\" hint-placeholder-val=\"{{false}}\">\n                <div style=\"position:absolute;top:calc(100% + 7px);left:0;right:0;z-index:40;max-height:280px;overflow-y:auto;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:7px;box-shadow:0 24px 50px -16px rgba(0,0,0,0.6),0 0 0 1px rgba(123,92,255,0.18)\">\n                  <sc-for list=\"{{s.groups}}\" as=\"g\" hint-placeholder-count=\"1\">\n                    <sc-if value=\"{{g.hasLabel}}\" hint-placeholder-val=\"{{false}}\">\n                      <div style=\"padding:9px 10px 5px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--violet)\">{{g.label}}<\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-for list=\"{{g.items}}\" as=\"it\" hint-placeholder-count=\"6\">\n                      <button onclick=\"{{it.onSelect}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:9px;border:none;background:{{it.bg}};color:{{it.color}};font-size:14px;font-weight:500;text-align:left;cursor:pointer;transition:background .14s\" style-hover=\"background:color-mix(in srgb,var(--violet) 16%,transparent)\">\n                        <span>{{it.name}}<\u002Fspan>\n                        <sc-if value=\"{{it.isActive}}\" hint-placeholder-val=\"{{false}}\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--violet);box-shadow:0 0 8px var(--violet)\"><\u002Fspan><\u002Fsc-if>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fsc-for>\n                <\u002Fdiv  .18s\" style-hover=\"border-color:var(--coral)\">Try again<\u002Fbutton>\n              <button onclick=\"{{clearOutput}}\" style=\"padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:transparent;color:var(--text-faint);font-size:13px;font-weight:500;cursor:pointer;transition:color .18s\" style-hover=\"color:var(--coral)\">Clear<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ========== MY RAMBLES ========== -->\n  <sc-if value=\"{{isRambles}}\" hint-placeholder-val=\"{{false}}\">\n    <main style=\"max-width:1180px;margin:0 auto;padding:34px 30px 60px\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:14px\">\n        <div>\n          <h1 style=\"font-size:36px;font-weight:700;letter-spacing:-0.025em;margin:0 0 6px\">My rambles<\u002Fh1>\n          <p style=\"font-size:15px;color:var(--text-dim);margin:0\">{{ramblesCount}} saved. Reopen one to keep tweaking it.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{goWorkspace}}\" style=\"padding:12px 18px;border:none;border-radius:13px;cursor:pointer;font-size:14px;font-weight:600;color:white;background:linear-gradient(95deg,var(--violet),var(--pink));box-shadow:0 10px 28px -10px rgba(123,92,255,0.7);transition:transform .16s\" style-hover=\"transform:translateY(-2px)\">New ramble<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px\">\n        <sc-for list=\"{{ramblesList}}\" as=\"r\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;transition:transform .2s,border-color .2s\" style-hover=\"transform:translateY(-4px);border-color:var(--violet)\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px\">\n              <span style=\"font-size:12px;color:var(--text-faint)\">{{r.date}}<\u002Fspan>\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{r.dot}};box-shadow:0 0 9px {{r.dot}}\"><\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-size:17px;font-weight:600;letter-spacing:-0.01em;margin:0 0 8px;line-height:1.3\">{{r.title}}<\u002Fh3>\n            <p style=\"font-size:14px;line-height:1.5;color:var(--text-dim);margin:0 0 14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">{{r.snippet}}<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px\">\n              <sc-for list=\"{{r.tags}}\" as=\"t\" hint-placeholder-count=\"3\">\n                <span style=\"padding:4px 10px;border-radius:8px;font-size:12px;font-weight:500;background:{{t.bg}};color:{{t.color}}\">{{t.label}}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:auto;display:flex;gap:7px\">\n              <button onclick=\"{{r.onReopen}}\" style=\"flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:white;background:linear-gradient(95deg,var(--violet),var(--pink));transition:transform .14s\" style-hover=\"transform:translateY(-1px)\">Reopen<\u002Fbutton>\n              <button onclick=\"{{r.onCopy}}\" style=\"padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .16s\" style-hover=\"color:var(--text);border-color:var(--violet)\">{{r.copyLabel}}<\u002Fbutton>\n              <button onclick=\"{{r.onDelete}}\" title=\"Delete\" style=\"padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:transparent;color:var(--text-faint);font-size:13px;cursor:pointer;transition:all .16s\" style-hover=\"color:var(--coral);border-color:var(--coral)\">Delete<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ramblesEmpty}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"text-align:center;padding:70px 20px;color:var(--text-dim)\">\n          <div style=\"font-family:'Caveat Brush',cursive;font-size:40px;color:var(--violet);margin-bottom:10px\">All clear<\u002Fdiv>\n          <p style=\"font-size:15px;margin:0 0 20px\">No rambles yet. Go make a mess and clean it up.<\u002Fp>\n          <button onclick=\"{{goWorkspace}}\" style=\"padding:12px 20px;border:none;border-radius:13px;cursor:pointer;font-size:14px;font-weight:600;color:white;background:linear-gradient(95deg,var(--violet),var(--pink))\">Start rambling<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:880},&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;signin&quot;,&quot;workspace&quot;,&quot;rambles&quot;],&quot;default&quot;:&quot;signin&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;},&quot;ambientGlow&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.95,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.05,&quot;unit&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Look&quot;},&quot;signaturePulse&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Look&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.SAMPLE = `You know what, I truly believe the second coming has already happened. If the Bible is real, which I don't put much faith in, it was written by humans, and humans are fallible and biased, and it could have been just a book of rules for the time it was written. It shouldn't be the all knowing oracle for our conscious choices. But aside from that, I believe the second coming has already happened. When Satan was cast from heaven, and I'm not religious at all, I avoid religion like the plague, but if Satan was cast down to earth, this is his domain, this is his world, his kingdom. No wonder it's so hard down here and goes against every fiber of my being, because this is hell. Hell isn't some place beneath our feet. It's here. It's now. It's the earth. It's our civilization. Satan reigns. This is his kingdom.`;\n\n    this.PRACTICAL_OUT = `Here is something I have been sitting with.\\n\\nI would not call myself religious. I keep my distance from it, and I am skeptical of the Bible as literal truth. It was written by people, and people are fallible and biased. To me it reads more like a product of its time than an authority I have to answer to.\\n\\nStill, one idea keeps circling back. What if the second coming already happened, and we simply missed it? And what if, the day the adversary fell, this world became his to run? It would explain why so much down here feels heavy and hard won.\\n\\nMaybe hell was never a place beneath our feet. Maybe it is right here, right now, the world we already live in.`;\n\n    this.FUN_OUT = `Gather close, because what I am about to tell you will sit with you long after the lights go out.\\n\\nI am no believer. I keep my distance from religion the way you keep your distance from a fire that has already jumped the pit. But lately a single terrible thought has wrapped itself around me and will not let go.\\n\\nWhat if the second coming already came and went, and nobody thought to send the invitations? What if, the day the great deceiver was thrown out of paradise, he landed right here and called it home?\\n\\nSuddenly every cruelty makes a horrible kind of sense. We were never waiting for hell to crack open beneath us. We have been standing in it the whole time, and we called it Tuesday.`;\n\n    this.KEY_POINTS = [\n      \"Skeptical of the Bible as literal or infallible truth\",\n      \"Reads scripture as a product of its era, not an oracle\",\n      \"Proposes that the second coming may already have happened\",\n      \"Suggests Earth itself could be the fallen domain\"\n    ];\n    this.FOLLOWUPS = [\n      \"Want this reworked as a short personal essay?\",\n      \"Should I keep it raw, or soften the edges?\",\n      \"Want a version that argues the opposite case?\"\n    ];\n\n    this.selectorDefs = [\n      { key:\"format\", label:\"Format\", prompt:\"Choose a format\", groups:[\n        { label:\"Practical\", items:[\"Email\",\"Quick note\",\"Summary\",\"AI prompt\",\"Meeting notes\",\"To do list\",\"Bullet points\",\"Status update\",\"Report\",\"Outline\",\"Tweet\",\"LinkedIn post\",\"Journal entry\"] },\n        { label:\"Fun\", items:[\"Tall tale\",\"Rap verse\",\"Spicy text\",\"Soap opera\",\"Meme caption\",\"Poem\",\"Haiku\",\"Fairy tale\",\"Conspiracy theory\",\"Movie trailer\",\"Stand up bit\",\"Greek myth\",\"Breaking news\"] }\n      ]},\n      { key:\"tone\", label:\"Tone\", prompt:\"Set a tone\", groups:[\n        { label:\"\", items:[\"Professional\",\"Friendly\",\"Direct\",\"Flirty\",\"Sultry\",\"Sarcastic\",\"Wholesome\",\"Deadpan\",\"Hyped\",\"Zen\"] }\n      ]},\n      { key:\"character\", label:\"Character\", prompt:\"Add a character\", groups:[\n        { label:\"\", items:[\"Conspiracy theorist\",\"Drama queen\",\"Sportscaster\",\"Pirate captain\",\"Wise grandma\",\"Malfunctioning robot\",\"Noir detective\",\"Influencer\",\"Cult leader\",\"Shakespeare\"] }\n      ]},\n      { key:\"accent\", label:\"Accent\", prompt:\"Pick an accent\", groups:[\n        { label:\"\", items:[\"Southern\",\"Pirate\",\"Valley girl\",\"Posh British\",\"New York\",\"Australian\",\"French\",\"Surfer\",\"Texan\",\"Scottish\"] }\n      ]}\n    ];\n    this.FUN_FORMATS = this.selectorDefs[0].groups[1].items;\n\n    this.state = {\n      screen: props.startScreen || \"signin\",\n      theme: \"dark\",\n      authMode: \"signin\",\n      inputText: \"\",\n      customVocab: \"\",\n      selections: { format:null, tone:null, character:null, accent:null },\n      openDropdown: null,\n      isRecording: false,\n      recordSeconds: 0,\n      status: \"idle\",\n      outputText: \"\",\n      finalOutput: \"\",\n      keyOpen: true,\n      followOpen: true,\n      copyLabel: \"Copy\",\n      shareLabel: \"Share\",\n      rambles: this._seedRambles()\n    };\n    this._iv = null;\n    this._rec = null;\n  }\n\n  _seedRambles(){\n    return [\n      { id:1, title:\"Standup notes that nobody can follow\", snippet:\"Blocked on the migration, also the staging box is throwing 500s again and I keep forgetting to mention the design review.\", tags:[[\"Meeting notes\",\"format\"],[\"Direct\",\"tone\"]], date:\"Jun 26\", dot:\"var(--violet)\" },\n      { id:2, title:\"The one about Satan running earth\", snippet:\"You know what, I truly believe the second coming has already happened, and if Satan was cast down here then this is his kingdom.\", tags:[[\"Drama\",\"format\"],[\"Conspiracy theorist\",\"character\"]], date:\"Jun 24\", dot:\"var(--pink)\" },\n      { id:3, title:\"Reply to the landlord, but nice\", snippet:\"The radiator has been knocking for two weeks and the hot water cuts out every morning around seven.\", tags:[[\"Email\",\"format\"],[\"Professional\",\"tone\"]], date:\"Jun 21\", dot:\"var(--coral)\" },\n      { id:4, title:\"Why my fantasy team is cursed\", snippet:\"Started the wrong quarterback again, benched the guy who went off, this happens every single week without fail.\", tags:[[\"Rap verse\",\"format\"],[\"Sportscaster\",\"character\"]], date:\"Jun 18\", dot:\"var(--violet)\" },\n      { id:5, title:\"Grocery brain dump\", snippet:\"Oat milk, the good coffee not the cheap one, something for dinner thursday, dog food, and those crackers.\", tags:[[\"To do list\",\"format\"],[\"Friendly\",\"tone\"]], date:\"Jun 15\", dot:\"var(--pink)\" },\n      { id:6, title:\"Pitch for the side project\", snippet:\"It is basically a translator but for your messy thoughts, you talk and it hands you something usable.\", tags:[[\"Summary\",\"format\"],[\"Hyped\",\"tone\"]], date:\"Jun 11\", dot:\"var(--coral)\" }\n    ];\n  }\n\n  componentDidMount(){ this._applyTheme(); this._applyGlow(); }\n  componentDidUpdate(prev){\n    this._applyTheme();\n    if (prev.startScreen !== this.props.startScreen && this.props.startScreen) this.setState({ screen: this.props.startScreen });\n    if (prev.ambientGlow !== this.props.ambientGlow) this._applyGlow();\n  }\n  componentWillUnmount(){ if(this._iv) clearInterval(this._iv); if(this._rec) clearInterval(this._rec); }\n\n  _applyTheme(){ try{ document.documentElement.dataset.theme = this.state.theme; }catch(e){} }\n  _applyGlow(){ try{ if(this.props.ambientGlow!=null) document.documentElement.style.setProperty(\"--glow\", String(this.props.ambientGlow)); }catch(e){} }\n\n  // nav\n  go(s){ this.setState({ screen:s, openDropdown:null }); }\n  toggleTheme(){ this.setState(st=>({ theme: st.theme===\"dark\"?\"light\":\"dark\" })); }\n\n  // input\n  setInput(v){ this.setState({ inputText:v }); }\n  doPaste(){ this.setState({ inputText:this.SAMPLE, openDropdown:null }); }\n  clearInput(){ this.setState({ inputText:\"\" }); }\n\n  toggleRecord(){\n    if (this.state.isRecording){\n      clearInterval(this._rec); this._rec=null;\n      this.setState(st=>({ isRecording:false, inputText: st.inputText ? st.inputText : this.SAMPLE }));\n    } else {\n      this.setState({ isRecording:true, recordSeconds:0 });\n      this._rec = setInterval(()=>{\n        this.setState(st=>{\n          const n = st.recordSeconds+1;\n          if (n>=180){ clearInterval(this._rec); this._rec=null; return { recordSeconds:180, isRecording:false, inputText: st.inputText||this.SAMPLE }; }\n          return { recordSeconds:n };\n        });\n      },1000);\n    }\n  }\n\n  // selectors\n  toggleDropdown(k){ this.setState(st=>({ openDropdown: st.openDropdown===k?null:k })); }\n  pick(k,v){ this.setState(st=>({ selections:{...st.selections,[k]:v}, openDropdown:null })); }\n  resetSelectors(){ this.setState({ selections:{format:null,tone:null,character:null,accent:null}, openDropdown:null }); }\n  setVocab(v){ this.setState({ customVocab:v }); }\n\n  _chosenOutput(){\n    const f = this.state.selections.format;\n    return (f && this.FUN_FORMATS.includes(f)) ? this.FUN_OUT : this.PRACTICAL_OUT;\n  }\n\n  doBabble(){\n    if (!this.state.inputText.trim()){ this.setState({ inputText:this.SAMPLE }); return this._run(); }\n    this._run();\n  }\n  _run(){\n    if (this._iv) clearInterval(this._iv);\n    const full = this._chosenOutput();\n    this.setState({ status:\"babbling\", outputText:\"\", finalOutput:full, openDropdown:null, copyLabel:\"Copy\", shareLabel:\"Share\" });\n    let i = 0;\n    this._iv = setInterval(()=>{\n      i += 4;\n      if (i >= full.length){ clearInterval(this._iv); this._iv=null; this.setState({ outputText:full, status:\"done\" }); }\n      else { this.setState({ outputText: full.slice(0,i) }); }\n    }, 16);\n  }\n  doTryAgain(){ this._run(); }\n  clearOutput(){ if(this._iv) clearInterval(this._iv); this.setState({ status:\"idle\", outputText:\"\", finalOutput:\"\" }); }\n\n  doCopy(){ try{ navigator.clipboard.writeText(this.state.finalOutput); }catch(e){} this.setState({ copyLabel:\"Copied\" }); setTimeout(()=>this.setState({copyLabel:\"Copy\"}),1600); }\n  doShare(){ try{ navigator.clipboard.writeText(this.state.finalOutput); }catch(e){} this.setState({ shareLabel:\"Link copied\" }); setTimeout(()=>this.setState({shareLabel:\"Share\"}),1600); }\n  toggleKey(){ this.setState(st=>({ keyOpen:!st.keyOpen })); }\n  toggleFollow(){ this.setState(st=>({ followOpen:!st.followOpen })); }\n\n  reopenRamble(r){ this.setState({ screen:\"workspace\", inputText:r.snippet, status:\"idle\", outputText:\"\" }); }\n  copyRamble(id){\n    this.setState(st=>({ rambles: st.rambles.map(r=> r.id===id ? {...r,_copied:true}:r) }));\n    setTimeout(()=>this.setState(st=>({ rambles: st.rambles.map(r=> r.id===id ? {...r,_copied:false}:r) })),1500);\n  }\n  deleteRamble(id){ this.setState(st=>({ rambles: st.rambles.filter(r=>r.id!==id) })); }\n\n  _fmtTime(s){ const m=Math.floor(s/60); const ss=s%60; return m+\":\"+(ss<10?\"0\":\"\")+ss; }\n  _tagStyle(kind){\n    if(kind===\"format\") return { bg:\"color-mix(in srgb,var(--violet) 18%,transparent)\", color:\"var(--violet)\" };\n    if(kind===\"tone\") return { bg:\"color-mix(in srgb,var(--pink) 18%,transparent)\", color:\"var(--pink)\" };\n    return { bg:\"color-mix(in srgb,var(--coral) 20%,transparent)\", color:\"var(--coral)\" };\n  }\n\n  renderVals(){\n    const st = this.state;\n    const sel = st.selections;\n    const screen = st.screen;\n    const pulse = (this.props.signaturePulse ?? true);\n\n    const selectors = this.selectorDefs.map(s=>{\n      const val = sel[s.key];\n      const isOpen = st.openDropdown===s.key;\n      return {\n        label: s.label,\n        display: val || s.prompt,\n        valueColor: val ? \"var(--text)\" : \"var(--text-faint)\",\n        borderColor: val ? \"var(--violet)\" : \"var(--line)\",\n        caretRotate: isOpen ? \"rotate(180deg)\" : \"rotate(0deg)\",\n        isOpen,\n        onToggle: ()=>this.toggleDropdown(s.key),\n        groups: s.groups.map(g=>({\n          label: g.label,\n          hasLabel: !!g.label,\n          items: g.items.map(it=>({\n            name: it,\n            isActive: val===it,\n            bg: val===it ? \"color-mix(in srgb,var(--violet) 14%,transparent)\" : \"transparent\",\n            color: val===it ? \"var(--text)\" : \"var(--text-dim)\",\n            onSelect: ()=>this.pick(s.key,it)\n          }))\n        }))\n      };\n    });\n\n    const metaParts = [sel.format, sel.tone, sel.character, sel.accent].filter(Boolean);\n    const resultMeta = (st.status===\"done\" && metaParts.length) ? metaParts.join(\" · \") : (st.status===\"babbling\" ? \"babbling\" : \"\");\n\n    return {\n      showHeader: screen!==\"signin\",\n      isSignin: screen===\"signin\",\n      isWorkspace: screen===\"workspace\",\n      isRambles: screen===\"rambles\",\n\n      goWorkspace: ()=>this.go(\"workspace\"),\n      goRambles: ()=>this.go(\"rambles\"),\n      goSignin: ()=>this.go(\"signin\"),\n      toggleTheme: ()=>this.toggleTheme(),\n      themeIcon: st.theme===\"dark\" ? \"L\" : \"D\",\n      themeLabel: st.theme===\"dark\" ? \"Switch to light\" : \"Switch to dark\",\n\n      // signin\n      authTitle: st.authMode===\"signin\" ? \"Welcome back\" : \"Make an account\",\n      authSub: st.authMode===\"signin\" ? \"No judgment. No blank page. Just better words.\" : \"Set it up once, then ramble forever.\",\n      authCTA: st.authMode===\"signin\" ? \"Sign in and start rambling\" : \"Create account and start rambling\",\n      setSignIn: ()=>this.setState({authMode:\"signin\"}),\n      setCreate: ()=>this.setState({authMode:\"create\"}),\n      signInTabBg: st.authMode===\"signin\" ? \"var(--surface)\" : \"transparent\",\n      signInTabColor: st.authMode===\"signin\" ? \"var(--text)\" : \"var(--text-faint)\",\n      createTabBg: st.authMode===\"create\" ? \"var(--surface)\" : \"transparent\",\n      createTabColor: st.authMode===\"create\" ? \"var(--text)\" : \"var(--text-faint)\",\n\n      // input\n      inputText: st.inputText,\n      onInput: (e)=>this.setInput(e.target.value),\n      inputCount: st.inputText.length,\n      inputWords: st.inputText.trim() ? st.inputText.trim().split(/\\s+/).length : 0,\n      doPaste: ()=>this.doPaste(),\n      clearInput: ()=>this.clearInput(),\n      isRecording: st.isRecording,\n      toggleRecord: ()=>this.toggleRecord(),\n      recordLabel: st.isRecording ? \"Stop\" : \"Record\",\n      recordBg: st.isRecording ? \"var(--coral)\" : \"linear-gradient(95deg,var(--violet),var(--pink))\",\n      recordShadow: st.isRecording ? \"0 0 0 4px color-mix(in srgb,var(--coral) 30%,transparent)\" : \"0 4px 16px -4px rgba(123,92,255,0.6)\",\n      recordDotRadius: st.isRecording ? \"2px\" : \"50%\",\n      recordTime: this._fmtTime(st.recordSeconds),\n\n      // controls\n      selectors,\n      customVocab: st.customVocab,\n      onVocab: (e)=>this.setVocab(e.target.value),\n      resetSelectors: ()=>this.resetSelectors(),\n      doBabble: ()=>this.doBabble(),\n      babbleLabel: st.status===\"babbling\" ? \"Babbling\" : \"Babble it\",\n      isBabbling: st.status===\"babbling\",\n      babbleAnim: (pulse && st.status!==\"babbling\") ? \"rb-pulse 3.2s ease-in-out infinite\" : \"none\",\n\n      // output\n      isIdle: st.status===\"idle\",\n      hasOutput: st.status!==\"idle\",\n      isDone: st.status===\"done\",\n      outputText: st.outputText,\n      showCaret: st.status===\"babbling\",\n      resultMeta,\n      idleMessage: \"Your polished or babbled text shows up right here. Stack a few choices, then babble it.\",\n      keyPoints: this.KEY_POINTS,\n      followups: this.FOLLOWUPS.map(t=>({ text:t, onClick:()=>this.doTryAgain() })),\n      keyOpen: st.keyOpen,\n      followOpen: st.followOpen,\n      keyCaret: st.keyOpen ? \"rotate(180deg)\" : \"rotate(0deg)\",\n      followCaret: st.followOpen ? \"rotate(180deg)\" : \"rotate(0deg)\",\n      toggleKey: ()=>this.toggleKey(),\n      toggleFollow: ()=>this.toggleFollow(),\n      doCopy: ()=>this.doCopy(),\n      doShare: ()=>this.doShare(),\n      doTryAgain: ()=>this.doTryAgain(),\n      clearOutput: ()=>this.clearOutput(),\n      copyLabel: st.copyLabel,\n      shareLabel: st.shareLabel,\n\n      // rambles\n      ramblesCount: st.rambles.length,\n      ramblesEmpty: st.rambles.length===0,\n      ramblesList: st.rambles.map(r=>({\n        title: r.title, snippet: r.snippet, date: r.date, dot: r.dot,\n        tags: r.tags.map(t=>{ const ts=this._tagStyle(t[1]); return { label:t[0], bg:ts.bg, color:ts.color }; }),\n        copyLabel: r._copied ? \"Copied\" : \"Copy\",\n        onReopen: ()=>this.reopenRamble(r),\n        onCopy: ()=>this.copyRamble(r.id),\n        onDelete: ()=>this.deleteRamble(r.id)\n      }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
